<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Drive Speed Optimizer</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 40px; }
      form div { margin: 15px 0; }
      label { display: block; margin-bottom: 5px; font-weight: bold; }
      input[type="text"] { padding: 8px; width: 100%; max-width: 300px; box-sizing: border-box; }
      button { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
      button:hover { background-color: #45a049; }
    </style>
  </head>
  <body>
    <h1>Witaj — Drive Speed Optimizer</h1>
    <p>To jest przykładowy plik HTML zwracany przez endpoint <code>/</code>.</p>

    <hr>
    <h2>Formularz</h2>
    <form method="post" action="/safe-speed-form">
      <div>
          <label>Visibility:</label>
          <input type="number" name="visibility" required>
      </div>
      <div>
          <label>Traffic:</label>
          <input type="number" name="traffic" required>
      </div>
      <div>
          <label>Vehicle Load:</label>
          <input type="number" name="vehicle_load" required>
      </div>
      <div>
          <label>Road:</label>
          <input type="number" name="road" required>
      </div>
      <button type="submit">Calculate</button>
    </form>
  </body>
</html>
